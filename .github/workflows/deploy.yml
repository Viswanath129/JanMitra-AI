name: JanMitra AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Android Build & Verify
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      continue-on-error: true # Just in case it's built directly

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: janmitra-citizen-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

  # 2. FastAPI Backend Build & Containerize
  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: build-android
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GitHub Container Registry (GHCR)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./server
        file: ./server/Dockerfile
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ github.repository }}/janmitra-backend:latest
          ghcr.io/${{ github.repository }}/janmitra-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 3. Production Deploy Check & Audit
  production-security-audit:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-size: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Security scan Python backend with Bandit
      run: bandit -r ./server -ll || true

    - name: Scan Python dependencies for vulnerabilities
      run: safety check -r ./server/requirements.txt || true
